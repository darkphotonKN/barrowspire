version: "3.9"

services:
  db:
    image: postgres:17
    container_name: barrowspire_api_gateway_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: barrowspire_api_gateway_db
    ports:
      - "5214:5432"
    volumes:
      - barrowspire_api_gateway_pgdata:/var/lib/postgresql/data

volumes:
  barrowspire_api_gateway_pgdata:
