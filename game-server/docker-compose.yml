  barrowspire-network:
    name: barrowspire-network

volumes:
  barrowspire-consul-data:
  barrowspire-rabbitmq-data:
  redis_data:
  # Auth Service volumes
  barrowspire_auth_service_pgdata:
  barrowspire_auth_service_test_pgdata:
  # Game Service volumes
  barrowspire_game_service_pgdata:
  barrowspire_game_service_test_pgdata:
  # Stats Service volumes
  barrowspire_stats_service_pgdata:
  barrowspire_stats_service_test_pgdata:
  # Items Service volumes
  barrowspire_items_service_pgdata:
  barrowspire_items_service_test_pgdata:
  # Notification Service volumes
  barrowspire_notification_service_pgdata:
  barrowspire_notification_service_test_pgdata:
  # API Gateway volumes
  barrowspire_api_gateway_pgdata:
  barrowspire_api_gateway_test_pgdata:
  # Example Service volumes
  barrowspire_example_service_pgdata:
  barrowspire_example_service_test_pgdata:
