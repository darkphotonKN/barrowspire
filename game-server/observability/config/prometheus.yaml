# Prometheus Configuration
#
# Prometheus is the METRICS storage backend.
# Unlike traces (push), Prometheus PULLS metrics from targets.
#
# Two ways metrics get to Prometheus:
# 1. OTel Collector exposes /metrics endpoint → Prometheus scrapes it
# 2. Your services expose /metrics endpoint → Prometheus scrapes directly
#
# We use option 1: everything goes through the Collector for consistency.

global:
  scrape_interval: 15s # How often to scrape targets
  evaluation_interval: 15s # How often to evaluate alerting rules

# Scrape configs - where Prometheus pulls metrics FROM
scrape_configs:
  # Scrape Prometheus itself (meta-monitoring)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape OTel Collector's exposed metrics
  # The Collector exposes metrics from your services on port 8889
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
    # Relabel to clean up metric names
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "otel_(.+)"
        target_label: __name__
        replacement: "${1}"

  # Scrape Tempo metrics (monitor the tracing backend itself)
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  # Scrape Loki metrics (monitor the logging backend itself)
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # If you want to scrape your Go services directly (optional)
  # services is expose /metrics endpoint

  # AUTH SERVICE
  - job_name: "auth-service"
    static_configs:
      - targets: ["host.docker.internal:8194"]

  # GAME SERVICE
  - job_name: "game-service"
    static_configs:
      - targets: ["host.docker.internal:8195"]

  # STATS SERVICE
  - job_name: "stats-service"
    static_configs:
      - targets: ["host.docker.internal:8196"]

  # ITEM SERVICE
  - job_name: "item-service"
    static_configs:
      - targets: ["host.docker.internal:7126"]
