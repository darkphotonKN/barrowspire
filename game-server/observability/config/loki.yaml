# Grafana Loki Configuration
#
# Loki is the LOG AGGREGATION backend.
# It receives logs from the OTel Collector and stores them.
# Grafana queries Loki using LogQL.
#
# Key concept: Loki INDEXES labels only, not log content.
# This makes it cheap but means you search by labels first,
# then grep through the actual log lines.

auth_enabled: false # Disable multi-tenancy for simplicity

server:
  http_listen_port: 3100 # Grafana and OTel Collector connect here
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

# Limits - adjust for production
limits_config:
  # Allow larger log lines
  max_line_size: 256kb
  # Retention period
  retention_period: 48h
  # Ingestion limits
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

# Compactor handles retention and index compaction
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
