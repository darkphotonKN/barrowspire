# OpenTelemetry Collector Configuration
#
# The Collector is the CENTRAL HUB for all telemetry data.
# Your services send everything here, and it routes to the right backends.
#
# Architecture:
#
#   Your Services ──OTLP──→ [RECEIVERS] ──→ [PROCESSORS] ──→ [EXPORTERS]
#                                                              │
#                                                              ├──→ Tempo (traces)
#                                                              ├──→ Prometheus (metrics)
#
# Three concepts:
# - RECEIVERS: How data comes IN (OTLP from your services)
# - PROCESSORS: Transform/batch/filter the data
# - EXPORTERS: Where data goes OUT (Tempo, Prometheus)

# OpenTelemetry Collector Configuration

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
