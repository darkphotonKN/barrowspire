syntax = "proto3";
package events;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/darkphotonKN/barrowspire-server/common/api/proto/events";

// events published by game-service
message MatchEndedEvent {
  string session_id = 1;
  google.protobuf.Timestamp match_started_at = 2;
  google.protobuf.Timestamp match_ended_at = 3;
  repeated PlayerMatchResult players = 4;
}

message PlayerMatchResult {
    string member_id = 1;
    string username = 2;
    bool win = 3;
    int32 final_position = 4;
    int32 kills = 5;
    int32 deaths = 6;
    bool escape = 7;
}


message ItemsExtractedEvent {
  string session_id = 1;
  string event_id = 2;
  repeated PlayerItems playerItems = 4;
}

message PlayerItems {
  string member_id = 1;
  Equipment equipment = 2;
  repeated Item inventory = 3;
}

// All equipment slots — mirrors EquipmentComponent in game-service.
// Each slot holds the full item data (nil when empty).
message Equipment {
  Item weapon = 1;
  Item head = 2;
  Item chest = 3;
  Item gloves = 4;
  Item legs = 5;
  Item ring_1 = 6;
  Item ring_2 = 7;
  Item consumable_1 = 8;
  Item consumable_2 = 9;
  Item consumable_3 = 10;
}

// Single item — carries everything needed to create an item_instances row.
// Maps 1:1 with ItemComponent (game-service) and item_instances table (items-service).
message Item {
  string template_id = 1;
  string item_type = 2;         // "weapon", "armor", "consumable"
  string name = 3;

  // Weapon stats
  int32 attack_power = 4;
  double critical_rate = 5;
  string weapon_type = 6;

  // Armor stats
  int32 defense_rating = 7;
  int32 magic_resistance = 8;
  string armor_slot = 9;        // "head", "chest", "gloves", "legs"

  // Consumable stats
  int32 healing_amount = 10;
  int32 mana_amount = 11;
  int32 buff_duration = 12;

  // Shared
  int32 buy_price = 13;
  int32 sell_price = 14;
  string description = 15;

  // Instance identity for at-extraction upsert. Empty for items rolled in-match
  // (chests/drops) so the items-service consumer creates a new row; populated
  // for items brought in via loadout so the consumer upserts the existing row.
  string instance_id = 16;
}

